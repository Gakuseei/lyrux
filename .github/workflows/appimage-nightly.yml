name: Nightly AppImage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  appimage:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine version
        id: version
        run: |
          SHORT_SHA="$(git rev-parse --short "${GITHUB_SHA}")"
          echo "version=nightly-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Install Zig
        run: |
          ZIG_VERSION=0.15.2
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            binutils \
            build-essential \
            desktop-file-utils \
            gettext \
            libadwaita-1-dev \
            libepoxy-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libxml2-utils \
            libwebkitgtk-6.0-dev \
            meson \
            ninja-build \
            python3-gi \
            pkg-config

      - name: Install current blueprint-compiler
        run: |
          BLUEPRINT_VERSION=v0.20.4
          git clone --depth 1 --branch "${BLUEPRINT_VERSION}" https://github.com/GNOME/blueprint-compiler.git /tmp/blueprint-compiler
          meson setup /tmp/blueprint-compiler/_build /tmp/blueprint-compiler --prefix /tmp/blueprint-prefix
          meson install -C /tmp/blueprint-compiler/_build
          echo "/tmp/blueprint-prefix/bin" >> "$GITHUB_PATH"

      - name: Install appimagetool
        run: |
          curl -L \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          LIMUX_MAX_GLIBC: "2.39"
        run: ./scripts/package.sh "${{ steps.version.outputs.version }}"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lyrux-appimage-${{ steps.version.outputs.short_sha }}
          path: dist/Lyrux-*.AppImage
          retention-days: 14
          if-no-files-found: error
