name: Rust Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Zig
        run: |
          ZIG_VERSION=0.15.2
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          tar -xf /tmp/zig.tar.xz -C /tmp
          echo "/tmp/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"

      - name: Install pinned Rust with required components
        run: |
          RUST_VERSION=1.94.1
          rustup toolchain install "${RUST_VERSION}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_VERSION}"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            blueprint-compiler \
            build-essential \
            libadwaita-1-dev \
            libepoxy-dev \
            libgtk-4-dev \
            libgtksourceview-5-dev \
            libwebkitgtk-6.0-dev \
            pkg-config

      - name: Build libghostty for embedding
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Doptimize=ReleaseFast -Dcpu=baseline

      - name: Run repository quality checks
        run: ./scripts/check.sh
